<!DOCTYPE html>
<html lang="en">
  <head>
    <title>EduLink Network</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>

    <div class="container">
      <nav>
        <a href="index.html">Home</a>
        <a href="session.html">My Session</a>
      </nav>

      <h1 class="logo">EduLink Network</h1>
      <p class="tagline">Fast. Affordable. Unlimited.</p>

      <h2>Select Your Hostel</h2>
      <select>
        <option value="">-- Select your Hostel --</option>
        <option value="new-male">New Male Hostel</option>
        <option value="new-female">New Female Hostel</option>
        <option value="abuja">Abuja Hostel</option>
        <option value="nana">Nana Hostel</option>
      </select>

      <h2>Select a Plan</h2>

      <div>
        <button onclick="selectPlan('Day Plan — ₦300 (17hrs)', 300)">Day Plan — ₦300 (17hrs)</button>
      </div>
      <div>
        <button onclick="selectPlan('Night Plan — ₦200 (7hrs)', 200)">Night Plan — ₦200 (7hrs)</button>
      </div>
      <div>
        <button onclick="selectPlan('Weekly Day — ₦1,800 (7 Days)', 1800)">Weekly Day — ₦1,800 (7 Days)</button>
      </div>
      <div>
        <button onclick="selectPlan('Weekly Night — ₦1,200 (7 Days)', 1200)">Weekly Night — ₦1,200 (7 Days)</button>
      </div>

      <h2>Already have a voucher?</h2>
      <input type="text" id="voucher-input" placeholder="e.g. EDU-1234">
      <button onclick="connectVoucher()">Connect</button>

      <p class="whatsapp" onclick="openWhatsApp()">Need help? WhatsApp us</p>
      <p><a href="recover.html" style="color:#aaaaaa; font-size:12px;">Paid but not connected? Click here</a></p>

    </div>
    
    <script src="./script.js"></script>
  </body>
</html>
